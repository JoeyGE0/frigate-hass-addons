name: Sync Frigate Add-ons

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
  schedule:
    # Sync stable, beta, and dev add-ons every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      backfill_releases:
        description: Create missing GitHub releases for current add-on versions
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run sync script smoke tests
        run: bash .github/scripts/test-sync-scripts.sh

  sync:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Backfill missing GitHub releases
        if: inputs.backfill_releases == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/backfill-addon-releases.sh
          .github/scripts/backfill-addon-releases.sh

      - name: Sync stable and beta add-ons from Frigate releases
        if: inputs.backfill_releases != true
        id: releases
        run: |
          set -euo pipefail

          releases=$(curl -fsSL "https://api.github.com/repos/blakeblackshear/frigate/releases?per_page=100")
          stable_json=$(echo "$releases" | jq '[.[] | select(.draft == false and .prerelease == false)][0]')
          beta_json=$(echo "$releases" | jq '[.[] | select(.draft == false)][0]')

          if [ "$stable_json" = "null" ] || [ -z "$stable_json" ]; then
            echo "No stable Frigate release found."
            exit 1
          fi

          if [ "$beta_json" = "null" ] || [ -z "$beta_json" ]; then
            echo "No Frigate release found for beta channel."
            exit 1
          fi

          stable_tag=$(echo "$stable_json" | jq -r '.tag_name')
          beta_tag=$(echo "$beta_json" | jq -r '.tag_name')
          echo "stable_tag=${stable_tag}" >> "$GITHUB_OUTPUT"
          echo "beta_tag=${beta_tag}" >> "$GITHUB_OUTPUT"

          chmod +x .github/scripts/sync-frigate-release.sh

          mapfile -t updates < <(
            .github/scripts/sync-frigate-release.sh frigate "$stable_json"
            .github/scripts/sync-frigate-release.sh frigate_fa "$stable_json"
            .github/scripts/sync-frigate-release.sh frigate_beta "$beta_json"
            .github/scripts/sync-frigate-release.sh frigate_fa_beta "$beta_json"
          )

          if [ "${#updates[@]}" -eq 0 ]; then
            echo "release_updates=false" >> "$GITHUB_OUTPUT"
            echo "No stable or beta add-on updates needed."
          else
            echo "release_updates=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${updates[@]}"
          fi

      - name: Sync dev add-on from Frigate dev branch commits
        if: inputs.backfill_releases != true
        id: dev
        env:
          GHCR_IMAGE: ghcr.io/blakeblackshear/frigate
        run: |
          set -euo pipefail

          dev_head=$(curl -fsSL "https://api.github.com/repos/blakeblackshear/frigate/commits/dev" | jq -r '.sha[:7]')
          current_dev=$(grep '^version:' frigate_fa_dev/config.yaml | sed -E 's/^version: "?([^"]+)"?/\1/')
          echo "dev_head=${dev_head}" >> "$GITHUB_OUTPUT"
          echo "current_dev=${current_dev}" >> "$GITHUB_OUTPUT"

          chmod +x .github/scripts/sync-frigate-dev.sh
          mapfile -t updates < <(.github/scripts/sync-frigate-dev.sh frigate_fa_dev)

          if [ "${#updates[@]}" -eq 0 ]; then
            echo "dev_updates=false" >> "$GITHUB_OUTPUT"
            echo "No dev add-on update needed."
          else
            echo "dev_updates=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${updates[@]}"
          fi

      - name: Commit and push updates
        if: inputs.backfill_releases != true
        id: commit
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            frigate/config.yaml frigate/CHANGELOG.md \
            frigate_fa/config.yaml frigate_fa/CHANGELOG.md \
            frigate_beta/config.yaml frigate_beta/CHANGELOG.md \
            frigate_fa_beta/config.yaml frigate_fa_beta/CHANGELOG.md \
            frigate_fa_dev/config.yaml frigate_fa_dev/CHANGELOG.md frigate_fa_dev/build.yaml frigate_fa_dev/Dockerfile

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to commit."
            exit 0
          fi

          subject="Sync Frigate add-ons"
          {
            echo "$subject"
            echo
            echo "Automated sync from upstream Frigate releases and dev branch commits."
            echo
            git diff --cached --name-only | while read -r file; do
              addon=$(echo "$file" | cut -d/ -f1)
              version=$(grep '^version:' "$addon/config.yaml" | sed -E 's/^version: "?([^"]+)"?/\1/')
              echo "- ${addon}: ${version}"
            done
          } > /tmp/commit-body.txt

          git commit -F /tmp/commit-body.txt
          git push origin HEAD:main
          echo "committed=true" >> "$GITHUB_OUTPUT"

          git diff-tree --no-commit-id --name-only -r HEAD \
            | awk -F/ '$2 == "config.yaml" { print $1 }' \
            | sort -u \
            | paste -sd, - \
            > /tmp/updated-addons.txt || true
          echo "updated_addons=$(cat /tmp/updated-addons.txt)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub releases
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/create-addon-releases.sh
          .github/scripts/create-addon-releases.sh

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Frigate add-on sync"
            echo
            echo "| Channel | Upstream target | Current dev | Updated |"
            echo "| --- | --- | --- | --- |"
            echo "| Stable | \`${{ steps.releases.outputs.stable_tag }}\` | | ${{ steps.releases.outputs.release_updates == 'true' && 'yes' || 'no' }} |"
            echo "| Beta | \`${{ steps.releases.outputs.beta_tag }}\` | | ${{ steps.releases.outputs.release_updates == 'true' && 'yes' || 'no' }} |"
            echo "| Dev | \`${{ steps.dev.outputs.dev_head }}\` | \`${{ steps.dev.outputs.current_dev }}\` | ${{ steps.dev.outputs.dev_updates == 'true' && 'yes' || 'no' }} |"
            echo
            if [ "${{ steps.commit.outputs.committed || 'false' }}" = "true" ]; then
              echo "Committed and pushed add-on version bumps to \`main\`."
              if [ -n "${{ steps.commit.outputs.updated_addons }}" ]; then
                echo
                echo "Created GitHub releases for updated add-ons (tag format: \`{slug}-{version}\`)."
              fi
            else
              echo "No repo changes were needed. This is normal when add-ons are already up to date, or when the newest dev commit does not have a GHCR image yet."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
