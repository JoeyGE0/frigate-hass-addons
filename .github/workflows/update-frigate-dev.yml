name: Update Frigate Dev Add-on

on:
  schedule:
    # Check every 6 hours for new dev branch builds.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for new Frigate dev build
        id: check
        env:
          GHCR_IMAGE: ghcr.io/blakeblackshear/frigate
        run: |
          set -euo pipefail

          current=$(grep '^version:' frigate_fa_dev/config.yaml | sed -E 's/^version: "?([^"]+)"?/\1/')
          response=$(curl -fsSL "https://api.github.com/repos/blakeblackshear/frigate/commits/dev")
          latest_short=$(echo "$response" | jq -r '.sha[:7]')
          latest_full=$(echo "$response" | jq -r '.sha')

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest_short=$latest_short" >> "$GITHUB_OUTPUT"
          echo "latest_full=$latest_full" >> "$GITHUB_OUTPUT"

          if [ "$current" = "$latest_short" ]; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
            echo "Already on latest dev commit ($current)."
            exit 0
          fi

          token=$(curl -fsSL \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:${GHCR_IMAGE}:pull" \
            | jq -r .token)
          status=$(curl -sI \
            -H "Authorization: Bearer $token" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "https://ghcr.io/v2/${GHCR_IMAGE}/manifests/${latest_short}" \
            | head -1)

          if echo "$status" | grep -q "200"; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
            echo "New dev image ready: $latest_short"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
            echo "Dev commit $latest_short found, but GHCR image is not ready yet."
          fi

      - name: Update add-on version
        if: steps.check.outputs.update_needed == 'true'
        env:
          SHORT_SHA: ${{ steps.check.outputs.latest_short }}
          FULL_SHA: ${{ steps.check.outputs.latest_full }}
        run: |
          set -euo pipefail

          sed -i "s/^version: .*/version: \"${SHORT_SHA}\"/" frigate_fa_dev/config.yaml

          {
            echo "### ${SHORT_SHA}"
            echo
            echo "- Track Frigate dev branch commit [${SHORT_SHA}](https://github.com/blakeblackshear/frigate/commit/${FULL_SHA})"
            echo
            cat frigate_fa_dev/CHANGELOG.md
          } > frigate_fa_dev/CHANGELOG.md.tmp
          mv frigate_fa_dev/CHANGELOG.md.tmp frigate_fa_dev/CHANGELOG.md

      - name: Commit and push
        if: steps.check.outputs.update_needed == 'true'
        env:
          SHORT_SHA: ${{ steps.check.outputs.latest_short }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frigate_fa_dev/config.yaml frigate_fa_dev/CHANGELOG.md
          git commit -m "$(cat <<EOF
Update Frigate (Full Access) Dev to ${SHORT_SHA}

Track latest Frigate dev branch build on GHCR.
EOF
)"
          git push
